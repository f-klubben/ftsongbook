name: Typst build

permissions:
  contents: write

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  release:
    types:
      - published
  workflow_dispatch:
    
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: typst-community/setup-typst@v4
              with:
                typst-version: 0.14.2
                allow-prereleases: false

            - uses: actions/setup-python@v6
              with:
                python-version: '3.13' 
            - name: Install Python dependencies
              run: |
                python3 -m pip install --upgrade pip
                python3 -m pip install pypdf

            - name: Install prerequisites
              run: |
                sudo apt update
                sudo apt install -y imagemagick curl unzip
            
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Compile the documents
              run: |
                make bookletpdf

            - name: Compile artifacts
              run: |
                python3 utils/generate_artifacts.py
            
            - name: Upload songbook (continuous)
              uses: actions/upload-artifact@v4
              with:
                name: Sangbog-kontinuert
                path: output/sangbog.pdf

            - name: Upload songbook (booklet)
              uses: actions/upload-artifact@v4
              with:
                name: Sangbog-booklet
                path: output/sangbog-booklet.pdf
            
            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                name: Artifacts
                path: output/songs.json

            - name: Upload release assets
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                files: |
                  output/sangbog.pdf
                  output/sangbog-booklet.pdf
                  output/songs.json